name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 最小权限：所有 job 仅读（test/build/e2e 都不 push/publish）。即便 e2e-smoke 跑的
# 第三方 tailwindcss 二进制有恶意也无法用 GITHUB_TOKEN 推库/发版（供应链降爆炸半径）。
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    # service 容器无法按矩阵腿条件挂载，sqlite 腿也会起一个 PG（闲置，无害）
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: label_sync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff check)
        if: matrix.db == 'sqlite'
        run: ruff check .

      - name: Format check (ruff format)
        if: matrix.db == 'sqlite'
        run: ruff format --check .

      - name: Run tests (${{ matrix.db }})
        env:
          # 空串 = falsy，conftest 走默认 tmp sqlite 模式
          TEST_DATABASE_URL: ${{ matrix.db == 'postgres' && 'postgresql+psycopg://ci:ci@localhost:5432/label_sync_test' || '' }}
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t label-sync:ci .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 根目录无 Node 守护（spec 验收 12）
        run: |
          test ! -f package.json && test ! -f package-lock.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests (vitest run, jsdom only)
        working-directory: frontend
        run: npm run test:unit
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Storybook build
        working-directory: frontend
        run: npm run build-storybook
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: TS 类型与 pydantic schema 漂移检查
        run: |
          pip install pydantic
          python tools/gen_ts_types.py --check

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build frontend dist（/ui smoke 前置；dist 被 gitignore）
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Tailwind output.css（旧 SPA 资产；钉版本+sha256 与 Dockerfile 一致）
        env:
          TW_VERSION: v4.3.1
          TW_SHA256: 2526d063ba03b71f9a3ea7d5cee14f0aec147f117f222d5adc97b1d736d45999
        run: |
          curl -fsSL -o "$RUNNER_TEMP/tailwindcss" \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TW_VERSION}/tailwindcss-linux-x64"
          echo "${TW_SHA256}  ${RUNNER_TEMP}/tailwindcss" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/tailwindcss"
          "$RUNNER_TEMP/tailwindcss" -i static/css/input.css -o static/css/output.css --minify

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run E2E smoke subset（其余 e2e opt-in，不进 CI）
        run: pytest e2e/ -m smoke -v
