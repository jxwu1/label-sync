# 双端处理 / label-sync — 生产部署
#
# 用法 (服务器):
#   1. git pull
#   2. docker compose build
#   3. docker compose up -d
#   4. docker compose logs -f
#
# 数据卷 ./data 挂到 /data, 里面放 stockpile.db / input / output / archive.
# 反代 (nginx / traefik / caddy) 上游指向 host:5000 (或改 ports 映射).

services:
  label-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: label-sync:latest
    container_name: label-sync
    restart: unless-stopped
    environment:
      LABEL_SYNC_DATA_DIR: /data
      LABEL_SYNC_HOST: "0.0.0.0"
      LABEL_SYNC_PORT: "5000"
      LABEL_SYNC_THREADS: "4"
      TZ: Europe/Athens
    volumes:
      - ./data:/data
      - ./data/attendance:/app/attendance  # attendance JSON 落持久卷, redeploy 不丢
      - ./data/monthly_summary:/app/monthly_summary  # 月度汇总 JSON 同理
    expose:
      - "5000"  # Coolify Traefik 反代走容器网络; 如需直接暴露主机端口改回 ports: "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:5000/\", timeout=3)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # §3.7 每日 03:00 Athens 触发 forecast_output 全量刷新
  # 单独容器隔离, label-sync redeploy 不影响 cron, cron 重启不影响 web
  forecast-cron:
    image: alpine:3.20
    container_name: label-sync-cron
    restart: unless-stopped
    depends_on:
      - label-sync
    environment:
      TZ: Europe/Athens
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null 2>&1
        cp /usr/share/zoneinfo/Europe/Athens /etc/localtime
        echo "0 3 * * * curl -fsS -X POST http://label-sync:5000/analytics/forecast/refresh >> /proc/1/fd/1 2>&1" > /etc/crontabs/root
        echo "[cron] installed: daily 03:00 Athens -> POST /analytics/forecast/refresh"
        exec crond -f -l 2
