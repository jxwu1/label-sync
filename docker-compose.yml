# 双端处理 / label-sync — 生产部署
#
# 用法 (服务器):
#   1. git pull
#   2. docker compose build
#   3. docker compose up -d
#   4. docker compose logs -f
#
# 数据卷 ./data 挂到 /data, 里面放 stockpile.db / input / output / archive.
# 反代 (nginx / traefik / caddy) 上游指向 host:5000 (或改 ports 映射).

services:
  label-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: label-sync:latest
    container_name: label-sync
    restart: unless-stopped
    environment:
      LABEL_SYNC_DATA_DIR: /data
      LABEL_SYNC_HOST: "0.0.0.0"
      LABEL_SYNC_PORT: "5000"
      LABEL_SYNC_THREADS: "4"
      TZ: Europe/Athens
      # before_request 全局闸校验 token 值: web 必须拿到与 cron 同一个 UPLOAD_TOKEN,
      # 否则 cron 带正确 token 也会被判无效 -> 401, 预测/回测刷新全失败.
      # :? 缺失即在 compose 替换阶段拒绝部署 (与 forecast-cron 同源同值).
      UPLOAD_TOKEN: ${UPLOAD_TOKEN:?UPLOAD_TOKEN 未注入, web 容器无法校验 cron token}
    volumes:
      - ./data:/data
      - ./data/attendance:/app/attendance  # attendance JSON 落持久卷, redeploy 不丢
      - ./data/monthly_summary:/app/monthly_summary  # 月度汇总 JSON 同理
    expose:
      - "5000"  # Coolify Traefik 反代走容器网络; 如需直接暴露主机端口改回 ports: "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:5000/\", timeout=3)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # §3.7 每日 03:00 Athens 触发 forecast_output 全量刷新 +
  # 第1期⑤ 每周日 01:00 触发 backtest 全量重跑 (EmpiricalQuantile)
  # 单独容器隔离, label-sync redeploy 不影响 cron, cron 重启不影响 web
  forecast-cron:
    image: alpine:3.20
    container_name: label-sync-cron
    restart: unless-stopped
    depends_on:
      - label-sync
    environment:
      TZ: Europe/Athens
      # before_request 只放行携带【非空】X-Upload-Token 的请求; cron 必须带它,
      # 否则被 302 重定向到 /login 而 curl -fsS 不跟跳转、不报错 -> 每天静默空转.
      # 由部署环境(Coolify) 注入, 与 label-sync 容器同一个 token.
      # :? 让缺失/空值在 compose 替换阶段就阻止部署(fail before deploy),
      # 而非等容器起来后才 FATAL; 下方运行期守卫保留作 defense-in-depth.
      UPLOAD_TOKEN: ${UPLOAD_TOKEN:?UPLOAD_TOKEN 未注入, 拒绝部署 forecast cron}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null 2>&1
        cp /usr/share/zoneinfo/Europe/Athens /etc/localtime
        if [ -z "$$UPLOAD_TOKEN" ]; then
          echo "[cron] FATAL: UPLOAD_TOKEN 未注入, 安装后会被 before_request 拦截而静默空转, 拒绝启动" >&2
          exit 1
        fi
        # token 在写 crontab 时展开并烤进任务行 (crond 不继承容器环境变量, 运行期再引用会取到空值).
        echo "0 3 * * * curl -fsS -X POST -H \"X-Upload-Token: $$UPLOAD_TOKEN\" http://label-sync:5000/analytics/forecast/refresh >> /proc/1/fd/1 2>&1" > /etc/crontabs/root
        # 周日 01:00 先跑 backtest (重, 全量 ~4k SKU 同步), 错峰于 03:00 forecast 之前 ->
        # 当周每日 forecast 的置信度分层都能 join 到最新成功的 EmpiricalQuantile run.
        echo "0 1 * * 0 curl -fsS -X POST -H \"X-Upload-Token: $$UPLOAD_TOKEN\" http://label-sync:5000/analytics/backtest/refresh >> /proc/1/fd/1 2>&1" >> /etc/crontabs/root
        echo "[cron] installed: daily 03:00 forecast/refresh + Sun 01:00 backtest/refresh, Athens (authed)"
        exec crond -f -l 2
