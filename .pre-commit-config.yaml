# pre-commit hooks — commit 前本地跑
# 首次安装：pip install pre-commit && pre-commit install
# 手动跑全仓：pre-commit run --all-files

repos:
  # ruff: Python lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 前端 JS lint: Phase 4 (2026-05-16) 移除, 依赖 IDE 自带 lint
  # 删除原因: eslint 强依赖 Node + npm install, 跟纯 Python 项目耦合
  # 如需重新加: 用 Biome / oxlint 这种 Rust 实现可减少 Node 依赖, 但仍需 npm
