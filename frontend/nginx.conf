server {
    listen 80;
    root /usr/share/nginx/html;

    # vite 产物文件名带内容 hash，可永久缓存
    location ~* ^/ui/assets/.*\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /ui/ {
        try_files $uri /ui/index.html;
    }

    location = / {
        return 302 /ui/;
    }
}
