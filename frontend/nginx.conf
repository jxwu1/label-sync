server {
    listen 80;
    root /usr/share/nginx/html;

    # 剥前缀架构: Caddy handle_path 剥掉 /ui 后 nginx 按根 serve。
    # nginx 视角的根 != 浏览器视角(/ui/), 任何绝对重定向(目录 301 等)都会丢 /ui 前缀
    # → 跳到 erp.jxwu.dev/<path> 掉前缀炸。强制重定向走相对路径, 一劳永逸。
    absolute_redirect off;

    # vite 产物文件名带内容 hash，可永久缓存
    location ~* ^/assets/.*\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 兜底: $uri/ /index.html 保证任意深度路由(/briefing/detail/123 剥完前缀)
    # 落到 index.html, 由 vue-router(history base=/ui/) 接管。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
