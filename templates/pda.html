<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>扫描</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pda.css') }}?v={{ asset_v }}">
<script>document.documentElement.dataset.theme='light';</script>
</head>
<body data-theme="light">
  <header class="pda-top">
    <button id="exitBtn" class="pda-exit" title="退出登录">退出</button>
    <select id="opSelect" class="pda-op"></select>
    <span id="netDot" class="pda-dot pda-dot--on" title="在线"></span>
    <button id="saveBtn" class="pda-save" disabled>保存</button>
  </header>
  <div id="editHint" class="pda-edithint" hidden></div>
  <main class="pda-grid" id="grid">
    <table>
      <thead><tr><th></th><th>A</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
  <footer class="pda-foot">
    <button id="undoBtn" class="pda-undo">↶ 撤销</button>
    <input id="scanInput" class="pda-scan" type="text" inputmode="none" autocomplete="off"
           placeholder="点这里激活，再用扫描枪扫">
    <span id="pendBadge" class="pda-pend" hidden>待同步 0</span>
  </footer>
  <script src="{{ url_for('static', filename='js/pda.js') }}?v={{ asset_v }}"></script>
</body>
</html>
