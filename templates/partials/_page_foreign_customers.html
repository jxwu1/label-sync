      <div class="page" id="pageForeignCustomers" x-data :class="$store.nav.current === 'foreign_customers' ? 'active' : ''">
        <!-- 顶部控制条 -->
        <div class="fc-control">
          <span class="fc-control-code">OVS-MO</span>
          <span class="fc-control-title">老外客人月度记录</span>
          <span class="fc-divider"></span>
          <span class="fc-control-label">月份</span>
          <input class="fc-inp fc-inp--mono" id="fcMonth" type="month" aria-label="月份">
          <button class="fc-cta fc-cta--ghost" id="fcRefresh">↻ 刷新</button>
          <button class="fc-cta fc-cta--ghost" id="fcDownloadPdf">↓ 下载 PDF</button>
          <span class="fc-control-spacer"></span>
          <button class="fc-cta fc-cta--primary" id="fcAddBtn">+ 新增记录</button>
        </div>

        <!-- 5 stat box grid -->
        <div class="fc-stats" id="fcSummary"></div>

        <!-- Records panel -->
        <section class="fc-panel">
          <header class="fc-panel-hd">
            <span class="fc-panel-code">REC</span>
            <span class="fc-panel-title">本月记录</span>
            <span class="fc-panel-sub" id="fcPanelSub">— 条</span>
            <span class="fc-control-spacer"></span>
            <input class="fc-search" id="fcSearch" type="text" placeholder="搜索 客户名 / 税号...">
          </header>
          <div class="fc-panel-bd">
            <table class="fc-table">
              <thead><tr>
                <th>客户名</th>
                <th class="fc-num">欠款 (€)</th>
                <th>税号</th>
                <th>付款日期</th>
                <th>托运日期</th>
                <th>状态</th>
                <th>备注</th>
                <th>操作</th>
              </tr></thead>
              <tbody id="fcRecordsBody">
                <tr><td colspan="8" class="fc-empty">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
        <div class="pur-modal-overlay attn-hidden" id="fcModalOverlay">
          <div class="pur-modal fc-modal">
            <div class="pur-modal-hd" id="fcModalTitle">新增记录</div>
            <div class="fc-stack">
              <label>客户 <select class="fc-inp" id="fcModalCustomer"></select></label>
              <label>月份 <input class="fc-inp" id="fcModalMonth" type="month"></label>
              <label>欠款金额 (€) <input class="fc-inp" id="fcModalAmount" type="number" step="0.01" placeholder="0.00"></label>
              <label>税号 <input class="fc-inp" id="fcModalTax" type="text" placeholder="例 GR1234567"></label>
              <label>付款日期 <input class="fc-inp" id="fcModalPayment" type="date"></label>
              <label>托运日期 <input class="fc-inp" id="fcModalShipping" type="date"></label>
              <label>备注 <textarea class="fc-inp" id="fcModalNotes" rows="3"></textarea></label>
            </div>
            <div class="pur-modal-actions">
              <button class="btn btn-primary" id="fcModalSubmit">确认</button>
              <button class="btn-mini" id="fcModalCancel">取消</button>
            </div>
          </div>
        </div>
      </div>
